<!DOCTYPE html>
<html>
<head>
<title>Admin Pesanan - Warkop SDB</title>
<link rel="stylesheet" href="pesanan.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <div class="header-top">

            <div class="icon-box">🔒</div>

            <div class="logo-area">
                <div class="logo">SDB</div>
                <div>
                    <b>ADMIN WARKOP SDB</b><br>
                    <small>Daftar Pesanan Masuk</small>
                </div>
            </div>

            <div class="icon-box">👨‍💼</div>

        </div>
    </div>

    <!-- LIST PESANAN -->
    <div class="list">

        <!-- PESANAN 1 -->
        <div class="card">
            <div class="info">
                <b>Pesanan #001</b>
                <p>Kopi Royal (1x)</p>
                <p>Kopsu (2x)</p>
                <span>Total: Rp 32.000</span>
            </div>
            <button class="hapus">Hapus</button>
        </div>

        <!-- PESANAN 2 -->
        <div class="card">
            <div class="info">
                <b>Pesanan #002</b>
                <p>Kopsu (1x)</p>
                <span>Total: Rp 10.000</span>
            </div>
            <button class="hapus">Hapus</button>
        </div>

        <!-- PESANAN 3 -->
        <div class="card">
            <div class="info">
                <b>Pesanan #003</b>
                <p>Kopi Royal (2x)</p>
                <span>Total: Rp 24.000</span>
            </div>
            <button class="hapus">Hapus</button>
        </div>

    </div>

    <!-- INFO -->
    <div class="info-box">
        * Tombol hapus hanya tampilan (HTML saja)
    </div>

</div>

</body>
</html>
